global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node
    static_configs:
      - targets: ['node_exporter:9100']

  - job_name: nvidia
    scrape_interval: 5s            # GPU stats are cheap and you want them snappy
    static_configs:
      - targets: ['nvidia_gpu_exporter:9835']
